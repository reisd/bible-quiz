<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#183c36" />
  <title>상반기 구역모임 성경퀴즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section id="start-screen" class="screen screen-active">
      <div class="hero-mark">✝</div>
      <p class="eyebrow">2026 상반기 구역모임</p>
      <h1 class="hero-title">성경퀴즈 훈련</h1>
      <p class="hero-subtitle">
        1월부터 6월까지 구역모임 자료를 바탕으로 만든
        <br />
        단순한 카드형 암기 도우미
      </p>
      <div class="hero-stats">
        <span class="stat-pill"><span id="set-count">12</span>개 모임</span>
        <span class="stat-pill"><span id="question-count">60</span>문제</span>
      </div>
      <button id="start-button" class="primary-button" type="button">시작하기</button>
    </section>

    <section id="quiz-screen" class="screen">
      <div class="topbar">
        <button id="home-button" class="ghost-button" type="button">처음</button>
        <div class="progress-group">
          <div class="progress-track">
            <div id="progress-bar" class="progress-value"></div>
          </div>
          <p id="progress-text" class="progress-text">1 / 60</p>
        </div>
      </div>

      <article id="question-card" class="quiz-card">
        <div class="meta-row">
          <span id="month-pill" class="meta-pill">1월</span>
          <span id="session-pill" class="meta-pill meta-pill-soft">첫 번째 모임</span>
        </div>
        <p id="set-title" class="set-title">주 안에서 행하라</p>
        <p id="scripture" class="scripture">골로새서 2:6-7</p>
        <p id="question-type" class="question-type">핵심 문제</p>
        <h2 id="question-text" class="question-text"></h2>
        <div class="hint-panel">
          <p class="answer-label hint-label">힌트</p>
          <p id="hint-text" class="hint-text"></p>
        </div>
        <button id="reveal-button" class="secondary-button" type="button">정답 보기</button>
        <div id="answer-panel" class="answer-panel" hidden>
          <p class="answer-label">정답</p>
          <p id="answer-text" class="answer-text"></p>
        </div>
      </article>

      <div class="nav-row">
        <button id="prev-button" class="nav-button" type="button">이전</button>
        <button id="shuffle-button" class="nav-button nav-button-accent" type="button">섞기</button>
        <button id="next-button" class="nav-button" type="button">다음</button>
      </div>
    </section>

    <section id="done-screen" class="screen">
      <div class="hero-mark">✓</div>
      <p class="eyebrow">완료</p>
      <h2 class="hero-title done-title">한 바퀴 복습했습니다</h2>
      <p class="hero-subtitle">
        다시 시작하거나, 문제를 섞어서 한 번 더 훈련할 수 있습니다.
      </p>
      <div class="done-actions">
        <button id="restart-button" class="primary-button" type="button">처음부터 다시</button>
        <button id="restart-shuffle-button" class="secondary-button" type="button">섞어서 다시</button>
      </div>
    </section>
  </main>

  <script src="quiz-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
